<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Download Textbook - EduPortal</title>
    
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Links -->
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
    
    <!-- Page Specific Styles -->
    <style>
        .download-hero {
            background: linear-gradient(135deg, #f8f9fa 0%, #eef2ff 100%);
            padding: 6rem 0;
            text-align: center;
            min-height: 80vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .download-card {
            background: white;
            max-width: 700px;
            width: 90%;
            margin: 0 auto;
            padding: 3rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.08);
            position: relative;
            overflow: hidden;
        }

        .download-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 6px;
            background: var(--primary-color);
        }

        .book-icon-wrapper {
            width: 100px;
            height: 100px;
            background: #eef2ff;
            color: var(--primary-color);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 3rem;
            margin: 0 auto 2rem;
        }

        .subject-title {
            font-size: 2.2rem;
            color: var(--text-dark);
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        .class-badge {
            display: inline-block;
            background: #fff0f3;
            color: var(--accent-color);
            padding: 0.4rem 1rem;
            border-radius: 50px;
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 2rem;
        }

        .action-buttons {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin-bottom: 2.5rem;
            flex-wrap: wrap;
        }

        .btn-dl {
            background: var(--primary-color);
            color: white;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            box-shadow: 0 10px 20px rgba(67, 97, 238, 0.2);
            cursor: pointer;
        }

        .btn-dl:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 25px rgba(67, 97, 238, 0.3);
            background: var(--secondary-color);
        }

        .btn-view {
            background: white;
            color: var(--text-dark);
            border: 2px solid #eee;
            padding: 1rem 2rem;
            border-radius: 12px;
            font-weight: 600;
            text-decoration: none;
            display: inline-flex;
            align-items: center;
            gap: 10px;
            transition: all 0.3s ease;
            cursor: pointer;
        }

        .btn-view:hover {
            border-color: var(--primary-color);
            color: var(--primary-color);
            background: #f8faff;
        }

        .file-details {
            display: flex;
            justify-content: center;
            gap: 2rem;
            padding-top: 2rem;
            border-top: 1px solid #eee;
            color: var(--text-light);
            font-size: 0.9rem;
            flex-wrap: wrap;
        }

        .detail-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .detail-item i {
            color: var(--primary-color);
        }
    </style>
</head>
<body>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo">
                <i class="fas fa-graduation-cap"></i> EduPortal
            </a>
            
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="9th-class.html">9th Class</a></li>
                <li><a href="10th-class.html">10th Class</a></li>
                <li><a href="#premium" class="btn-premium">Go Premium</a></li>
            </ul>

            <div class="hamburger" id="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </div>
        </div>
    </nav>

    <!-- Download Section -->
    <section class="download-hero">
        <div class="download-card">
            <div class="book-icon-wrapper">
                <i class="fas fa-book-open"></i>
            </div>
            
            <h1 class="subject-title" id="dynamicSubject">Loading...</h1>
            <span class="class-badge" id="classBadge">Loading...</span>
            
            <div class="action-buttons">
                <!-- Download Button -->
                <a href="#" target="_blank" class="btn-dl" id="downloadBtn">
                    <i class="fas fa-cloud-download-alt"></i> Download PDF
                </a>
                
                <!-- View Online Button -->
                <a href="#" target="_blank" class="btn-view" id="viewBtn">
                    <i class="fas fa-eye"></i> View Online
                </a>
            </div>

            <div class="file-details">
                    <div class="detail-item"><i class="fas fa-file-pdf"></i> Format: PDF</div>
                    <div class="detail-item"><i class="fas fa-hdd"></i> Size: ~15 MB</div>
                    <div class="detail-item"><i class="fas fa-calendar-check"></i> Edition: 2026</div>
                </div>

                <!-- Debug Log -->
                <div style="margin-top: 20px; padding: 15px; background: #f8f9fa; border-radius: 8px; border: 1px solid #e9ecef; text-align: left; max-height: 300px; overflow-y: auto;">
                    <h4 style="margin: 0 0 10px 0; color: #333;">🔍 Debug Log:</h4>
                    <div id="debugLog" style="font-family: monospace; font-size: 12px; line-height: 1.5;"></div>
                </div>
        </div>
    </section>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-bottom">
                <p>&copy; 2026 EduPortal. All rights reserved.</p>
            </div>
        </div>
    </footer>

    <script src="../js/main.js"></script>
    <script>
        // All Books Download Links - Google Drive (keys use hyphens for consistency)
        const booksLinks = {
            // 9th Class Books
            '9th-Mathematics': 'https://drive.google.com/uc?id=1TyNExEOd38RD1SJEymhw-dvzka763G8W&export=download',
            '9th-Physics': 'https://drive.google.com/uc?id=1fT-RIUt2XEiMRR-l77XNVhgynI8lGfKw&export=download',
            '9th-Biology': 'https://drive.google.com/uc?id=1cQGoj2kqaKxtqFbusqdyMWmCrQxTxQ1Q&export=download',
            '9th-Chemistry': 'https://drive.google.com/uc?id=1wWRGvInmZNguWLTqbKUBt9GvlWN60F8F&export=download',
            '9th-Computer-Science': 'https://drive.google.com/uc?id=1qFj7MAnKP_QLPSKk5KmZ60MNYAq-oU6D&export=download',
            '9th-English': 'https://drive.google.com/uc?id=1_YwWIv-2BVlu0HKzGmJykMZQciSMYqKl&export=download',
            '9th-Urdu': 'https://drive.google.com/uc?id=1Ok9esDCRia95erKn1fAolPvlb-8_EYHm&export=download',
            '9th-Islamiat': 'https://drive.google.com/uc?id=1CyuT5ZYK-R1AdaHgFWpkeB1GysjQ-wxe&export=download',
            '9th-Al-Quran': 'https://drive.google.com/uc?id=1omKAVQfHOJkZ80e0dQtA7SxLitS39c4P&export=download',
            
            // 10th Class Books
            '10th-Mathematics': 'https://drive.google.com/uc?id=1j9BAihALWhxvDA0zWszzs2OFpBNjV7AC&export=download',
            '10th-Physics': 'https://drive.google.com/uc?id=1M_KxQr7duXRdtiRTPPO7llkwqPyjL8Fj&export=download',
            '10th-Biology': 'https://drive.google.com/uc?id=18PJDnU1u_bj801lJBHlOO1Gj0hKt-P8y&export=download',
            '10th-Chemistry': 'https://drive.google.com/uc?id=1rxhOQU5PnfjxFIdMJJ5voMnhjDwiKJpp&export=download',
            '10th-Computer-Science': 'https://drive.google.com/uc?id=1SBYB30Z5Tdpl3TiHdf-viuFEnQeXza1P&export=download',
            '10th-English': 'https://drive.google.com/uc?id=1JPD9dTUEYdlDHRnRkIKybm2lRCoRRt6h&export=download',
            '10th-Urdu': 'https://drive.google.com/uc?id=17vNihhHGH44gnrNRO5AEknx28Tyzpr-j&export=download',
            '10th-Pakistan-Studies': 'https://drive.google.com/uc?id=1nqTLh-X5B0zMhY1tpWodJ_q9BjO3_bli&export=download',
            '10th-Al-Quran': 'https://drive.google.com/uc?id=1gQDn7H8iq4G0DN_XRhGC8Sg95HE-_Xvc&export=download'
        };

        // Debug log function
        function debugLog(message, type = 'info') {
            const debugLogEl = document.getElementById('debugLog');
            if (!debugLogEl) return;
            const time = new Date().toLocaleTimeString();
            const colorClass = type === 'error' ? 'color: #dc3545;' : 
                             type === 'success' ? 'color: #28a745;' : 
                             'color: #007bff;';
            debugLogEl.innerHTML += `<div style="${colorClass}">[${time}] ${message}</div>`;
            console.log(message);
        }

        // Extract File ID from Google Drive URL
        function getFileId(url) {
            const match = url.match(/id=([^&]+)/);
            return match ? match[1] : null;
        }

        document.addEventListener('DOMContentLoaded', function() {
            debugLog('🔄 Page loaded, updating content...');
            
            // Get URL parameters
            const urlParams = new URLSearchParams(window.location.search);
            const classParam = urlParams.get('class');
            const subjectParam = urlParams.get('subject');
            
            debugLog(`📍 URL Parameters: class = ${classParam}, subject = ${subjectParam}`);
            
            // Update Class Badge
            const classBadge = document.getElementById('classBadge');
            if (classBadge && classParam) {
                if (classParam === '10th') {
                    classBadge.textContent = '10th Class | English & Urdu Medium';
                } else if (classParam === '9th') {
                    classBadge.textContent = '9th Class | English & Urdu Medium';
                } else {
                    classBadge.textContent = `${classParam} Class | English & Urdu Medium';
                }
            }
            
            // Update Subject Title
            const subjectTitle = document.getElementById('dynamicSubject');
            if (subjectTitle && subjectParam) {
                const formattedSubject = subjectParam
                    .replace(/-/g, ' ')
                    .replace(/%20/g, ' ')
                    .replace(/\b\w/g, l => l.toUpperCase());
                
                subjectTitle.textContent = formattedSubject + ' Textbook';
                document.title = `Download ${formattedSubject} - EduPortal`;
            }
            
            // Update Download Buttons
            if (classParam && subjectParam) {
                // Normalize subject: replace spaces with hyphens and make sure it's clean
                const normalizedSubject = subjectParam.replace(/\s+/g, '-');
                const key = `${classParam}-${normalizedSubject}`;
                debugLog(`🔑 Looking for key: ${key}`);
                
                const downloadLink = booksLinks[key];
                
                if (downloadLink) {
                    debugLog(`✅ Found download link!`, 'success');
                    const fileId = getFileId(downloadLink);
                    debugLog(`📦 File ID: ${fileId}`);
                    
                    // Update download button - Direct download attempt
                    const downloadBtn = document.getElementById('downloadBtn');
                    if (downloadBtn) {
                        downloadBtn.href = downloadLink;
                        downloadBtn.target = '_blank';
                        debugLog(`🔗 Download button href: ${downloadLink}`);
                    }
                    
                    // Update view button - Google Drive viewer
                    const viewBtn = document.getElementById('viewBtn');
                    if (viewBtn && fileId) {
                        viewBtn.href = `https://drive.google.com/file/d/${fileId}/view`;
                        viewBtn.target = '_blank';
                        debugLog(`👁️ View button href: ${viewBtn.href}`);
                    }
                } else {
                    debugLog(`⚠️ No download link found for key: ${key}`, 'error');
                    
                    // Disable buttons if no link found
                    const downloadBtn = document.getElementById('downloadBtn');
                    const viewBtn = document.getElementById('viewBtn');
                    
                    if (downloadBtn) {
                        downloadBtn.href = '#';
                        downloadBtn.onclick = function(e) {
                            e.preventDefault();
                            alert('Book not available yet. Please check back later!');
                        };
                    }
                    
                    if (viewBtn) {
                        viewBtn.href = '#';
                        viewBtn.onclick = function(e) {
                            e.preventDefault();
                            alert('Book not available yet. Please check back later!');
                        };
                    }
                }
            } else {
                debugLog('⚠️ Missing class or subject parameters in URL', 'error');
            }
        });
    </script>
</body>
</html>
