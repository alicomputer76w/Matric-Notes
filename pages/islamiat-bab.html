<!DOCTYPE html>
<html lang="ur" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>اسلامیات - باب کے ابواب</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="../css/responsive.css">
     <!-- Favicon -->
    <link rel="icon" type="image/png" href="../favicon.png">
    <style>
        body { font-family: 'Noto Nastaliq Urdu', serif; line-height: 2.2; }
        
        .page-header { 
            background: linear-gradient(135deg, #06a77d, #1b4332); 
            color: white; padding: 3rem 0; text-align: center; 
        }
        
        .breadcrumb { margin-top: 1rem; font-size: 1rem; opacity: 0.9; }
        .breadcrumb a { color: #d8f3dc; }

        .chapters-container {
            max-width: 900px;
            margin: 4rem auto;
            padding: 0 20px;
        }

        .chapter-card {
            background: white;
            border-radius: 12px;
            margin-bottom: 1.5rem;
            box-shadow: var(--shadow);
            overflow: hidden;
            border: 1px solid #eee;
            transition: var(--transition);
        }

        .chapter-card:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(6, 167, 125, 0.15);
        }

        .chapter-header {
            padding: 1.8rem;
            display: flex;
            align-items: center;
            gap: 1.5rem;
            cursor: pointer;
        }

        .chapter-number {
            background: #06a77d;
            color: white;
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.3rem;
            font-weight: 700;
            flex-shrink: 0;
        }

        .chapter-title {
            font-size: 1.4rem;
            font-weight: 600;
            color: #1b4332;
            flex-grow: 1;
        }

        .view-btn {
            background: #06a77d;
            color: white;
            padding: 0.7rem 1.3rem;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 0.95rem;
            transition: var(--transition);
        }

        .view-btn:hover {
            background: #047857;
        }
    </style>
</head>
<body>

    <nav class="navbar">
        <div class="container nav-container">
            <a href="../index.html" class="logo"><i class="fas fa-graduation-cap"></i> EduPortal</a>
            <ul class="nav-menu" id="navMenu">
                <li><a href="../index.html">Home</a></li>
                <li><a href="9th-class.html" class="active">9th Class</a></li>
                <li><a href="10th-class.html">10th Class</a></li>
                <li><a href="#premium" class="btn-premium">Go Premium</a></li>
            </ul>
            <div class="hamburger" id="hamburger"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <header class="page-header">
        <div class="container">
            <h1 id="babTitle">باب کے ابواب</h1>
            <p>اسلامیات - 9ویں جماعت</p>
            <div class="breadcrumb"><a href="../index.html">Home</a> / <a href="9th-class.html">9th Class</a> / <a href="islamiat-9th.html">اسلامیات</a> / <span id="babNumber">باب</span></div>
        </div>
    </header>

    <section class="chapters-container" id="chaptersList">
        <!-- Chapters will be loaded dynamically via JavaScript -->
    </section>

    <footer class="footer"><div class="container"><div class="footer-bottom"><p>&copy; 2026 EduPortal. All rights reserved.</p></div></div></footer>
    
    <script src="../js/main.js"></script>
    <script>
        // Islamiat Chapters Data (Extracted from images)
        const islamiatData = {
            1: {
                title: "قرآن مجید کی تلاوت اور اس کی تعلیمات",
                chapters: [
                    "قرآن مجید کی تلاوت اور اس کی تعلیمات (سورۃ الفاتحہ)",
                    "احادیث نبوی ﷺ (ایمان کی بنیادیں)",
                    "ایمان کی بنیادیں (توحید، رسالت، آخرت)",
                    "نماز کی اہمیت اور فضیلت",
                    "روزے کی اہمیت اور فضیلت",
                    "زکوٰۃ کی اہمیت اور فضیلت"
                ]
            },
            2: {
                title: "ایمانیات",
                chapters: [
                    "توحید",
                    "رسالت",
                    "آخرت",
                    "فرشتوں پر ایمان",
                    "آسمانی کتابوں پر ایمان"
                ]
            },
            3: {
                title: "عبادات",
                chapters: [
                    "نماز",
                    "روزہ",
                    "زکوٰۃ",
                    "حج",
                    "جہاد",
                    "دعا اور ذکر"
                ]
            },
            4: {
                title: "معاملات",
                chapters: [
                    "حلال و حرام",
                    "حقوق العباد",
                    "والدین کے حقوق",
                    "پڑوسیوں کے حقوق",
                    "یتیموں اور مسکینوں کے حقوق",
                    "اسلامی معاشرہ"
                ]
            },
            5: {
                title: "حسن اخلاق",
                chapters: [
                    "صدق",
                    "امانت",
                    "حیا",
                    "عفو و درگزر",
                    "شکر گزاری"
                ]
            },
            6: {
                title: "سیرت النبی ﷺ",
                chapters: [
                    "حضور ﷺ کی پیدائش اور ابتدائی زندگی",
                    "نبوت کا اعلان",
                    "مکہ میں دعوت",
                    "ہجرت مدینہ",
                    "مدینہ میں زندگی",
                    "وصال نبوی ﷺ"
                ]
            },
            7: {
                title: "اسلامی تہذیب و تمدن",
                chapters: [
                    "اسلامی تہذیب کی بنیادیں",
                    "اسلامی معاشرہ کی خصوصیات",
                    "اسلامی تعلیمات کا اثر"
                ]
            }
        };

        // Load chapters based on URL parameter
        document.addEventListener('DOMContentLoaded', () => {
            const params = new URLSearchParams(window.location.search);
            const babNum = parseInt(params.get('bab'));
            
            if (babNum && islamiatData[babNum]) {
                const babData = islamiatData[babNum];
                document.getElementById('babTitle').innerText = `باب ${babNum}: ${babData.title}`;
                document.getElementById('babNumber').innerText = `باب ${babNum}`;
                
                const container = document.getElementById('chaptersList');
                babData.chapters.forEach((chapter, index) => {
                    const chapterCard = document.createElement('div');
                    chapterCard.className = 'chapter-card';
                    chapterCard.innerHTML = `
                        <div class="chapter-header">
                            <div class="chapter-number">${index + 1}</div>
                            <div class="chapter-title">${chapter}</div>
                            <a href="islamiat-chapter.html?bab=${babNum}&chap=${index + 1}" class="view-btn">
                                دیکھیں <i class="fas fa-arrow-left"></i>
                            </a>
                        </div>
                    `;
                    container.appendChild(chapterCard);
                });
            } else {
                container.innerHTML = '<p style="text-align: center; padding: 3rem; font-size: 1.3rem;">کوئی ڈیٹا نہیں ملا</p>';
            }
        });
    </script>
</body>
</html>
